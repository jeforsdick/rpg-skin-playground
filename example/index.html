<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission: Reinforceable — Example Game</title>

<!-- Current skin architecture: shared primitives, landing, then gameplay. -->
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../skin-v2.css?v=clean3">

</head>

<body class="skin-quest-hub skin-v2">
  <div id="game-container">
    <h1>Mission: Reinforceable</h1>
    <h2 id="scenario-title">Behavior Intervention Simulator</h2>

    <div id="toolbar">
  <div id="teacher-badge">Teacher: <span id="teacher-code">Test</span></div>
  <div id="score-badge">Points: <span id="points">0</span></div>
  <div id="hearts-display" aria-label="Hearts"></div>

  <div class="quest-stat quest-progress-stat" hidden>
    <span>Quest Progress <strong id="quest-progress-value">0%</strong></span>
    <span class="quest-meter quest-progress-meter" aria-hidden="true"><i></i></span>
  </div>

  <div class="quest-stat scenario-progress-stat" hidden>
    <span>Scenario Progress</span>
    <span class="quest-meter" aria-hidden="true"><i></i></span>
  </div>

  <div id="feedback">
    <div id="coach-icon">
      <img id="coach-img" src="../assets/skin-v2/wizard-meh.png" alt="MR Wizard"/>
    </div>
    <div id="feedback-text"></div>
  </div>
</div>

<div class="screen-content-shell">
  <div id="story-text"></div>
  <div id="choices"></div>
</div>

<div id="bottom-action-slot">
  <div class="utility-actions quest-bottom-nav">
    <a class="quest-nav-link" href="#choices"><img src="../assets/skin-v2/bottom-bar-quest-icon.png" alt=""><span>Missions</span></a>
    <button id="progress-btn" class="ghost"><img src="../assets/skin-v2/bottom-bar-my-progress-icon.png" alt=""><span>Progress</span></button>
    <a class="quest-nav-link quest-resources-link" href="#" aria-disabled="true"><img src="../assets/skin-v2/bottom-bar-resources-icon.png" alt=""><span>Resources</span></a>
    <button id="home-btn" class="ghost"><img src="../assets/skin-v2/bottom-bar-start-over-icon.png" alt=""><span>Start Over</span></button>
  </div>
</div>
</div>
   <!-- Shared engine/dashboard are one folder up. -->
  <script src="../engine.js?v=20260622-3"></script>
  <script src="../dashboard.js?v=20260621-7"></script>

  <!-- Example content setup -->
  <script>
    window.GAME_CONFIG = window.GAME_CONFIG || {};
    window.POOL = window.POOL || {};
    POOL.daily = POOL.daily || [];
    POOL.wild = POOL.wild || [];
    POOL.crisis = POOL.crisis || [];

    GAME_CONFIG.resultEndpoint = "https://script.google.com/macros/s/AKfycbw4DsAMLija2_VVkk_8A8NOvWidCoyqPVgaY00pNi6jRkjmhfUySkQToYXqQTwigzS7/exec";
    GAME_CONFIG.defaultStudent = "Student";

    GAME_CONFIG.fidelityHigh = `High fidelity. You recognized the function of Student's behavior, kept access to the routine available, prompted the replacement behavior, and reinforced the first plan-aligned response quickly enough to strengthen future implementation.`;

    GAME_CONFIG.fidelityMid = `Developing fidelity. Your response included supportive elements, but one active ingredient was missing or delayed. Tighten the next move by making the first step observable, prompting the replacement behavior earlier, or reinforcing re-entry faster.`;

    GAME_CONFIG.fidelityLow = `Low fidelity. The response drifted from the BIP and may have increased escape, adult attention, peer attention, or escalation. Reset by reducing language, returning to the function-based plan, and reinforcing the first safe step back into the routine.`;

    GAME_CONFIG.actionHigh = `<ul>
      <li>Keep using private pre-correction before predictable triggers.</li>
      <li>Prompt Student's replacement behavior before refusal becomes public.</li>
      <li>Reinforce the first small step back into instruction, peers, or routines.</li>
    </ul>`;

    GAME_CONFIG.actionMid = `<ul>
      <li>Shift from general encouragement to one observable first action.</li>
      <li>Make sure breaks, help, or choices include a clear return-to-routine step.</li>
      <li>Move reinforcement closer to the exact behavior the BIP is trying to build.</li>
    </ul>`;

    GAME_CONFIG.actionLow = `<ul>
      <li>Reduce public correction, threats, and extended explanations during activation.</li>
      <li>Do not remove Student from the task or peer routine unless safety requires it.</li>
      <li>Return to the sequence: prevent, prompt replacement, reinforce re-entry, then problem solve later.</li>
    </ul>`;
  </script>

  <script src="content/daily-mission-1.js"></script>
  <script src="content/daily-mission-2.js"></script>
  <script src="content/daily-mission-3.js"></script>
  <script src="content/wildcard-mission-1.js"></script>
  <script src="content/wildcard-mission-2.js"></script>
  <script src="content/wildcard-mission-3.js"></script>
  <script src="content/crisis-mission-1.js"></script>
  <script src="content/crisis-mission-2.js"></script>
  <script src="content/crisis-mission-3.js"></script>
</body>
</html>
