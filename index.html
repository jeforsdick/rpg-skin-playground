<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission: Reinforceable</title>
  <link rel="icon" href="favicon.png" />
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2933;
      background: #f4f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(920px, calc(100% - 32px));
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
    }

    p {
      max-width: 620px;
      margin: 0 0 28px;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border: 1px solid #c9d4e5;
      border-radius: 8px;
      background: #fff;
      color: #183153;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      border-color: #4f7ac7;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 122, 199, .18);
    }
  </style>
</head>
<body>
  <main>
    <h1>Mission: Reinforceable</h1>
    <p>Temporary project landing page while the beta game and dissertation website are being organized for deployment.</p>
    <nav aria-label="Site sections">
      <a href="/game/">Open Game</a>
      <a href="/research/">Research</a>
      <a href="/intake/">Intake</a>
      <a href="/beta/">Beta</a>
    </nav>
  </main>
</body>
</html>
